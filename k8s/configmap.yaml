apiVersion: v1
kind: ConfigMap
metadata:
  name: sms-chatgpt-config
  namespace: ${KUBE_NAMESPACE}
data:
  SMS_BACKEND: "adb"
  SMS_SERIAL_PORT: "/dev/ttyUSB0"
  SMS_BAUDRATE: "115200"
  SMS_POLL_SECONDS: "5"
  SMS_REPLY_LIMIT: "140"
  SMS_INBOUND_LIMIT: "1000"
  ADB_PATH: "adb"
  ADB_SERVER_SOCKET: "tcp:host.minikube.internal:5037"
  ADB_SERIAL: ""
  ADB_SEND_MODE: "compose"
  ADB_SEND_COMMAND_TEMPLATE: ""
  ADB_STATE_FILE: "/tmp/adb-sms-state.txt"
  ADB_SKIP_EXISTING: "true"
  SESSION_BACKEND: "kubernetes"
  KUBERNETES_NAMESPACE: "${KUBE_NAMESPACE}"
  CHAT_POD_IMAGE: "${WORKER_IMAGE}"
  CHAT_POD_IDLE_SECONDS: "60"
  CHAT_POD_TIMEOUT_SECONDS: "30"
  CHAT_HISTORY_FILE: "/tmp/sms-chatgpt-history.json"
  CHAT_HISTORY_MAX_TURNS: "12"
  POLL_ENABLED: "true"
  POLL_KEYWORDS: "poll,vote,voting"
  POLL_STATE_FILE: "/tmp/sms-chatgpt-poll.json"
  POLL_POD_NAME: "sms-poll-active"
  LLM_PROVIDER: "openai"
  OPENAI_MODEL: "gpt-4o-mini"
